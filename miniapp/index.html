<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Ravon AI · mobil bosh menyu</title>
    <!-- Font Awesome 6 (haqiqiy ikonlar) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f5fe 0%, #e9f0fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        /* asosiy karta — mobil qurilmaga o‘xshab */
        .menu-screen {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 44px;
            box-shadow: 0 25px 50px -10px rgba(0, 32, 64, 0.25),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.7);
            padding: 24px 16px 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.2s ease;
        }

        /* sarlavha (ixtiyoriy) */
        .greeting {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            padding-left: 8px;
        }
        .greeting i {
            font-size: 32px;
            color: #1e3c72;
            background: rgba(255,255,255,0.5);
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 28px;
            box-shadow: 0 6px 12px rgba(0,40,80,0.1);
            backdrop-filter: blur(4px);
        }
        .greeting-text {
            font-weight: 600;
            font-size: 22px;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #00337c, #130f40);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .greeting-text small {
            font-size: 14px;
            font-weight: 400;
            color: #2c3e70;
            display: block;
            margin-top: 2px;
            letter-spacing: normal;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #3e5a7f;
        }

        /* tugmalar grid */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* asosiy tugma */
        .menu-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.85);
            border-radius: 28px;
            padding: 14px 18px 14px 20px;
            text-decoration: none;
            color: #09203f;
            box-shadow: 0 6px 12px rgba(42, 65, 98, 0.08), 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            cursor: pointer; /* static bo‘lsa ham bosilgandek */
            -webkit-tap-highlight-color: transparent;
            position: relative;
            isolation: isolate;
            overflow: hidden;
        }

        /* ikonka doirasi — haqiqiy icon */
        .icon-bg {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #1e3c72;
            box-shadow: 0 8px 16px -6px rgba(0, 70, 120, 0.2), inset 0 -1px 0 rgba(0,0,0,0.02);
            transition: transform 0.2s ease, box-shadow 0.3s, background 0.2s;
            flex-shrink: 0;
        }

        /* matn qismi */
        .btn-text {
            flex: 1;
            font-weight: 590;
            font-size: 17px;
            letter-spacing: -0.2px;
            line-height: 1.35;
            display: flex;
            flex-direction: column;
        }

        .btn-sub {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.7;
            color: #1f3a5f;
            margin-top: 2px;
        }

        /* animatsion effektlar (silliq) */
        .menu-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 30%) var(--y, 30%), rgba(255,255,255,0.8), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
            pointer-events: none;
        }

        .menu-btn:hover {
            transform: scale(1.01) translateY(-2px);
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 18px 28px -10px rgba(12, 60, 120, 0.25);
        }

        .menu-btn:hover .icon-bg {
            transform: scale(1.05) rotate(1deg);
            background: #ffffff;
            box-shadow: 0 12px 20px -8px #0f3f7a40;
            color: #004a9f;
        }

        /* aktiv bosilgandek (touch) */
        .menu-btn:active {
            transform: scale(0.985) translateY(0px);
            transition: all 0.1s;
            background: rgba(236, 74, 74, 0.95);
        }

        /* har bir tugma uchun maxsus ikon ranglari (ixtiyoriy) */
        .menu-btn:nth-child(1) .icon-bg { color: #c61aff; }  /* Ravon AI */
        .menu-btn:nth-child(2) .icon-bg { color: #d44b0f; }  /* Talaffuz */
        .menu-btn:nth-child(3) .icon-bg { color: #1e7e34; }  /* Matnni ovozga */
        .menu-btn:nth-child(4) .icon-bg { color: #2c3e9b; }  /* Profil */
        .menu-btn:nth-child(5) .icon-bg { color: #b23b2b; }  /* Tariflar */
        .menu-btn:nth-child(6) .icon-bg { color: #008b8b; }  /* Bot qanday */

        /* ortiqcha joy yo‘q – hamma tugmalar bir xil */
        .spacer, .extra { display: none; }

        /* juda kichik ekranlar */
        @media (max-width: 360px) {
            .btn-text { font-size: 15px; }
            .icon-bg { width: 44px; height: 44px; font-size: 22px; }
        }

        /* umuman olib tashlangan header yoki footer yo‘q */
        .credit-note {
            text-align: center;
            font-size: 11px;
            color: #4a6380;
            margin-top: 20px;
            opacity: 0.5;
            letter-spacing: 0.3px;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="menu-screen">
        <!-- salomlashuv (kutilganidek, kerakli tugmalarni to‘ldiradi) -->
        <div class="greeting">
            <i class="fa-regular fa-hand-peace"></i>
            <div class="greeting-text">
                Salom! <small>yangi imkoniyatlar</small>
            </div>
        </div>

        <!-- MENYU – faqat berilgan 6 tugma, ortiqcha narsa yo‘q -->
        <div class="menu-grid">


            <!-- 2️⃣ Talaffuzni tekshirish -->
            <a href="#" class="menu-btn" aria-label="Talaffuzni tekshirish">
                <span class="icon-bg"><i class="fa-solid fa-ear-listen"></i></span>
                <span class="btn-text">Talaffuzni tekshirish</span>
            </a>

            <!-- 3️⃣ Matnni ovozga aylantirish -->
            <a href="#" class="menu-btn" aria-label="Matnni ovozga aylantirish">
                <span class="icon-bg"><i class="fa-solid fa-waveform"></i></span>
                <span class="btn-text">Matnni ovozga aylantirish</span>
            </a>

            <!-- 4️⃣ Profil -->
            <a href="#" class="menu-btn" aria-label="Profil">
                <span class="icon-bg"><i class="fa-regular fa-user"></i></span>
                <span class="btn-text">Profil</span>
            </a>

            <!-- 5️⃣ Tariflar | Ko‘proq foyda olish -->
            <a href="#" class="menu-btn" aria-label="Tariflar">
                <span class="icon-bg"><i class="fa-regular fa-gem"></i></span>
                <span class="btn-text">
                    Tariflar
                    <span class="btn-sub">Ko‘proq foyda olish</span>
                </span>
            </a>

            <!-- 6️⃣ Bot qanday ishlaydi? -->
            <a href="#" class="menu-btn" aria-label="Bot qanday ishlaydi">
                <span class="icon-bg"><i class="fa-regular fa-circle-question"></i></span>
                <span class="btn-text">Bot qanday ishlaydi?</span>
            </a>

        </div>

        <!-- oddiy statik eslatma (ortiqcha emas, juda yengil) -->
        <div class="credit-note">
            • haqiqiy ikonlar • silliq animatsiya •
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script>
        (function () {
            const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
            if (tg) {
                tg.ready();
                tg.expand();
            }
            const initData = tg ? tg.initData : '';
            const apiFetch = (p, opt) => {
                const o = opt || {};
                o.headers = o.headers || {};
                o.headers['x-telegram-init-data'] = initData;
                return fetch('/api' + p, o);
            };
            let currentReferenceText = null;
            let currentType = 'general';
            const openDB = () => new Promise((resolve, reject) => {
                const req = indexedDB.open('Index.db', 1);
                req.onupgradeneeded = () => {
                    const db = req.result;
                    if (!db.objectStoreNames.contains('assessments')) db.createObjectStore('assessments', { keyPath: 'id', autoIncrement: true });
                    if (!db.objectStoreNames.contains('files')) db.createObjectStore('files', { keyPath: 'id', autoIncrement: true });
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
            const saveAssessment = async (data) => {
                const db = await openDB();
                const tx = db.transaction('assessments', 'readwrite');
                tx.objectStore('assessments').add({ createdAt: Date.now(), data });
                tx.oncomplete = () => db.close();
            };
            const savePDFBlob = async (blob) => {
                const db = await openDB();
                const tx = db.transaction('files', 'readwrite');
                tx.objectStore('files').add({ createdAt: Date.now(), name: 'report_' + Date.now() + '.pdf', blob });
                tx.oncomplete = () => db.close();
            };
            const greet = (name) => {
                const el = document.querySelector('.greeting-text');
                if (el) el.innerHTML = 'Salom, ' + name + '! <small>yangi imkoniyatlar</small>';
            };
            apiFetch('/user-data').then(r => r.ok ? r.json() : null).then(d => {
                if (d && d.user && d.user.first_name) greet(d.user.first_name);
            }).catch(() => { });
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.addEventListener('mousemove', function (e) {
                    const rect = this.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    this.style.setProperty('--x', x + '%');
                    this.style.setProperty('--y', y + '%');
                });
                btn.addEventListener('mouseleave', function () {
                    this.style.setProperty('--x', '30%');
                    this.style.setProperty('--y', '30%');
                });
            });
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.addEventListener('touchstart', function () { this.style.transition = 'all 0.1s'; }, { passive: true });
                btn.addEventListener('touchend', function () { this.style.transition = ''; });
            });
            const q = (label) => document.querySelector('.menu-btn[aria-label="' + label + '"]');
            const btnPron = q('Talaffuzni tekshirish');
            const btnTts = q('Matnni ovozga aylantirish');
            const btnProfile = q('Profil');
            const btnTariffs = q('Tariflar');
            const up = document.createElement('input');
            up.type = 'file';
            up.accept = 'audio/*';
            up.style.display = 'none';
            document.body.appendChild(up);
            if (btnPron) {
                btnPron.addEventListener('click', async () => {
                    const mode = prompt('1) O\'zim yozaman\n2) Tasodifiy so‘z/matn');
                    currentReferenceText = null;
                    currentType = 'general';
                    if (mode === '1') {
                        const txt = prompt('O\'zingiz talaffuz qilmoqchi bo‘lgan matn yoki so‘zni yozing');
                        if (!txt) return;
                        alert('Ajoyib, endi ovozli xabar yuboring. Eslatma: yuborgan audiongiz matnga mos bo‘lsin.');
                        currentReferenceText = txt;
                        currentType = 'compare';
                        up.value = '';
                        up.click();
                    } else if (mode === '2') {
                        const t = prompt('Tanlang: word yoki text');
                        const type = (t && t.toLowerCase().includes('text')) ? 'text' : 'word';
                        try {
                            const r = await apiFetch('/random-word?type=' + type);
                            const j = await r.json();
                            const content = j && (j.word || j.content);
                            if (!content) { alert('Maʼlumot topilmadi'); return; }
                            alert('Iltimos, quyidagi matnni o‘qib audio yuboring:\n\n' + content);
                            currentReferenceText = content;
                            currentType = 'compare';
                            up.value = '';
                            up.click();
                        } catch { alert('Xatolik'); }
                    } else {
                        up.value = '';
                        up.click();
                    }
                });
                up.addEventListener('change', async (e) => {
                    const file = e.target.files && e.target.files[0];
                    if (!file) return;
                    const fd = new FormData();
                    fd.append('audio', file);
                    fd.append('duration', '0');
                     if (currentReferenceText) {
                        fd.append('reference_text', currentReferenceText);
                     }
                    try {
                        const r = await apiFetch('/analyze-audio', { method: 'POST', body: fd });
                        const j = await r.json();
                        if (j && j.success) {
                            await saveAssessment(j.data || j);
                            const { jsPDF } = window.jspdf;
                            const doc = new jsPDF();
                            const d = j.data || {};
                            const s = String(d.overallScore || 0);
                            doc.setFontSize(16);
                            doc.text('Talaffuz tahlili', 10, 15);
                            doc.setFontSize(12);
                            doc.text('Umumiy: ' + s + '%', 10, 28);
                            doc.text('Aniqlik: ' + String(d.accuracyScore || 0) + '%', 10, 38);
                            doc.text('Ravonlik: ' + String(d.fluencyScore || 0) + '%', 10, 48);
                            doc.text('Ohang: ' + String(d.prosodyScore || 0) + '%', 10, 58);
                            if (d.transcription) {
                                doc.text('Transkriptiya:', 10, 72);
                                doc.setFontSize(10);
                                doc.text(String(d.transcription).slice(0, 800), 10, 82, { maxWidth: 180 });
                            }
                            const blob = doc.output('blob');
                            await savePDFBlob(blob);
                            alert('PDF saqlandi');
                        } else {
                            alert('Xatolik');
                        }
                    } catch {
                        alert('Xatolik');
                    }
                });
            }
            if (btnTts) {
                btnTts.addEventListener('click', async () => {
                    const text = prompt('Ajoyib! Ovozga aylantirmoqchi bo‘lgan matn yoki so‘zni kiriting');
                    if (!text) return;
                    const v = prompt('Ovoz turini tanlang: 1) Erkak  2) Ayol');
                    const voice = (v === '1') ? 'en-US-GuyNeural' : 'en-US-AriaNeural';
                    try {
                        const r = await apiFetch('/text-to-speech', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text, voice })
                        });
                        const b = await r.blob();
                        const url = URL.createObjectURL(b);
                        const audio = new Audio(url);
                        audio.play();
                    } catch {
                        alert('Xatolik');
                    }
                });
            }
            if (btnProfile) {
                btnProfile.addEventListener('click', async () => {
                    try {
                        const u = await apiFetch('/user-data');
                        const d = await u.json();
                        const s = d.stats || {};
                        const me = d.user || {};
                        const info = [
                            'Maʼlumotlarim:',
                            '• Ism: ' + (me.first_name || ''),
                            '• ID: ' + (me.id || me.telegram_id || ''),
                            '• Tarif: ' + (me.tariff_name || '—'),
                            '',
                            'Natijalarim:',
                            '• Foydalanish: ' + String(s.total_assessments || 0),
                            '• O‘rtacha ball: ' + String(Math.round(s.avg_overall || 0)) + '%',
                            '',
                            'Admin bilan bog‘lanish: @khamidovsanat'
                        ].join('\n');
                        alert(info);
                        const dl = confirm('Oxirgi saqlangan PDFni yuklab olishni xohlaysizmi?');
                        if (dl) {
                            const getLastPDFBlob = async () => {
                                const db = await openDB();
                                const tx = db.transaction('files', 'readonly');
                                const store = tx.objectStore('files');
                                if (store.getAll) {
                                    const all = await new Promise((resolve, reject) => {
                                        const req = store.getAll();
                                        req.onsuccess = () => resolve(req.result || []);
                                        req.onerror = () => reject(req.error);
                                    });
                                    db.close();
                                    if (all.length) return all[all.length - 1].blob;
                                    return null;
                                }
                                db.close();
                                return null;
                            };
                            const blob = await getLastPDFBlob();
                            if (blob) {
                                const url = URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.href = url;
                                a.download = 'report.pdf';
                                a.click();
                                setTimeout(() => URL.revokeObjectURL(url), 3000);
                            } else {
                                alert('Lokal xotirada PDF topilmadi');
                            }
                        }
                        const lb = await apiFetch('/leaderboard');
                        const top = await lb.json();
                        if (Array.isArray(top) && top.length) {
                            let msg = 'Top foydalanuvchilar:\n';
                            top.slice(0, 5).forEach((u, i) => {
                                msg += `${i + 1}. ${u.first_name || ''} — ${Math.round(u.avg_score || 0)}% (${u.usage_count || 0}x)\n`;
                            });
                            alert(msg);
                        }
                    } catch {
                        if (tg) tg.sendData(JSON.stringify({ source: 'mini_app', action: 'profile' }));
                    }
                });
            }
            if (btnTariffs) {
                btnTariffs.addEventListener('click', async () => {
                    try {
                        const r = await apiFetch('/user-data');
                        const j = await r.json();
                        const tariffs = j.tariffs || [];
                        const lines = tariffs.map(t => `${t.id}) ${t.name} — ${t.price} so‘m`);
                        lines.push('', 'Bepul limit olish: Referal tizimi orqali do‘stlaringizni taklif qiling');
                        const choice = prompt(lines.join('\n') + '\n\nSotib olish uchun tarif ID sini kiriting:');
                        if (choice && tg) {
                            tg.sendData(JSON.stringify({ source: 'mini_app', action: 'select_tariff_' + choice }));
                        }
                    } catch {
                        if (tg) tg.sendData(JSON.stringify({ source: 'mini_app', action: 'tariffs' }));
                    }
                });
            }
            const btnHow = q('Bot qanday ishlaydi');
            if (btnHow) {
                btnHow.addEventListener('click', () => {
                    if (tg) tg.sendData(JSON.stringify({ source: 'mini_app', action: 'how_it_works' }));
                });
            }
        })();
    </script>
</body>
</html>
