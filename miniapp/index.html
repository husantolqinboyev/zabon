<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Ravon AI · mobil bosh menyu</title>
    <!-- Font Awesome 6 (haqiqiy ikonlar) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f5fe 0%, #e9f0fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        /* asosiy karta — mobil qurilmaga o‘xshab */
        .menu-screen {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 44px;
            box-shadow: 0 25px 50px -10px rgba(0, 32, 64, 0.25),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.7);
            padding: 24px 16px 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.2s ease;
        }

        /* sarlavha (ixtiyoriy) */
        .greeting {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            padding-left: 8px;
        }
        .greeting i {
            font-size: 28px;
            color: #1e3c72;
            background: rgba(255,255,255,0.5);
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 26px;
            box-shadow: 0 6px 12px rgba(0,40,80,0.1);
            backdrop-filter: blur(4px);
        }
        .greeting-text {
            font-weight: 600;
            font-size: 22px;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #00337c, #130f40);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .greeting-text small {
            font-size: 14px;
            font-weight: 400;
            color: #2c3e70;
            display: block;
            margin-top: 2px;
            letter-spacing: normal;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #3e5a7f;
        }

        /* tugmalar grid */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* asosiy tugma */
        .menu-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.85);
            border-radius: 28px;
            padding: 14px 18px 14px 20px;
            text-decoration: none;
            color: #09203f;
            box-shadow: 0 6px 12px rgba(42, 65, 98, 0.08), 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            cursor: pointer; /* static bo‘lsa ham bosilgandek */
            -webkit-tap-highlight-color: transparent;
            position: relative;
            isolation: isolate;
            overflow: hidden;
        }

        /* ikonka doirasi — haqiqiy icon */
        .icon-bg {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #1e3c72;
            box-shadow: 0 8px 16px -6px rgba(0, 70, 120, 0.2), inset 0 -1px 0 rgba(0,0,0,0.02);
            transition: transform 0.2s ease, box-shadow 0.3s, background 0.2s;
            flex-shrink: 0;
        }

        /* matn qismi */
        .btn-text {
            flex: 1;
            font-weight: 590;
            font-size: 16px;
            letter-spacing: -0.2px;
            line-height: 1.35;
            display: flex;
            flex-direction: column;
        }

        .btn-sub {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.7;
            color: #1f3a5f;
            margin-top: 2px;
        }

        /* animatsion effektlar (silliq) */
        .menu-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 30%) var(--y, 30%), rgba(255,255,255,0.8), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
            pointer-events: none;
        }

        .menu-btn:hover {
            transform: scale(1.01) translateY(-2px);
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 18px 28px -10px rgba(12, 60, 120, 0.25);
        }

        .menu-btn:hover .icon-bg {
            transform: scale(1.05) rotate(1deg);
            background: #ffffff;
            box-shadow: 0 12px 20px -8px #0f3f7a40;
            color: #004a9f;
        }

        /* aktiv bosilgandek (touch) */
        .menu-btn:active {
            transform: scale(0.985) translateY(0px);
            transition: all 0.1s;
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 1);
            box-shadow: 0 10px 18px -10px rgba(12, 60, 120, 0.25);
        }

        /* har bir tugma uchun maxsus ikon ranglari (ixtiyoriy) */
        .menu-btn:nth-child(1) .icon-bg { color: #c61aff; }  /* Ravon AI */
        .menu-btn:nth-child(2) .icon-bg { color: #d44b0f; }  /* Talaffuz */
        .menu-btn:nth-child(3) .icon-bg { color: #1e7e34; }  /* Matnni ovozga */
        .menu-btn:nth-child(4) .icon-bg { color: #2c3e9b; }  /* Profil */
        .menu-btn:nth-child(5) .icon-bg { color: #b23b2b; }  /* Tariflar */
        .menu-btn:nth-child(6) .icon-bg { color: #008b8b; }  /* Bot qanday */

        /* ortiqcha joy yo‘q – hamma tugmalar bir xil */
        .spacer, .extra { display: none; }

        /* juda kichik ekranlar */
        @media (max-width: 360px) {
            .btn-text { font-size: 14px; }
            .icon-bg { width: 38px; height: 38px; font-size: 20px; }
        }
        @media (max-width: 320px) {
            .menu-screen { border-radius: 36px; padding: 18px 12px 22px; }
            .greeting i { width: 40px; height: 40px; font-size: 24px; }
            .btn-text { font-size: 13px; }
            .btn-sub { font-size: 12px; }
            .icon-bg { width: 36px; height: 36px; font-size: 18px; }
        }

        /* umuman olib tashlangan header yoki footer yo‘q */
        .credit-note {
            text-align: center;
            font-size: 11px;
            color: #4a6380;
            margin-top: 20px;
            opacity: 0.5;
            letter-spacing: 0.3px;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="menu-screen">
        <!-- salomlashuv (kutilganidek, kerakli tugmalarni to‘ldiradi) -->
        <div class="greeting">
            <i class="fa-solid fa-hand-peace"></i>
            <div class="greeting-text">
                Salom! <small>yangi imkoniyatlar Ravon AI</small>
            </div>
        </div>

        <!-- MENYU – faqat berilgan 6 tugma, ortiqcha narsa yo‘q -->
        <div class="menu-grid">


            <!-- 2️⃣ Talaffuzni tekshirish -->
            <a href="tallafuz.html" class="menu-btn" aria-label="Talaffuzni tekshirish">
                <span class="icon-bg"><i class="fa-solid fa-ear-listen"></i></span>
                <span class="btn-text">Talaffuzni tekshirish</span>
            </a>

            <!-- 3️⃣ Matnni ovozga aylantirish -->
            <a href="tts.html" class="menu-btn" aria-label="Matnni ovozga aylantirish">
                <span class="icon-bg"><i class="fa-solid fa-waveform"></i></span>
                <span class="btn-text">Matnni ovozga aylantirish</span>
            </a>

            <!-- 4️⃣ Profil -->
            <a href="profile.html" class="menu-btn" aria-label="Profil">
                <span class="icon-bg"><i class="fa-solid fa-user"></i></span>
                <span class="btn-text">Profil</span>
            </a>

            <!-- 5️⃣ Tariflar | Ko‘proq foyda olish -->
            <a href="tarif.html" class="menu-btn" aria-label="Tariflar">
                <span class="icon-bg"><i class="fa-solid fa-gem"></i></span>
                <span class="btn-text">
                    Tariflar
                    <span class="btn-sub">Ko‘proq foyda olish</span>
                </span>
            </a>

            <!-- 6️⃣ Bot qanday ishlaydi? -->
            <a href="botqanday.html" class="menu-btn" aria-label="Bot qanday ishlaydi">
                <span class="icon-bg"><i class="fa-solid fa-circle-question"></i></span>
                <span class="btn-text">Bot qanday ishlaydi?</span>
            </a>

        </div>

        <!-- oddiy statik eslatma (ortiqcha emas, juda yengil) -->
        <div class="credit-note">
            • Ravon AI • Sizning yordamchingiz •
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function () {
            const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
            if (tg) {
                tg.ready();
                tg.expand();
            }
            const initData = tg ? tg.initData : '';
            const apiFetch = (p, opt) => {
                const o = opt || {};
                o.headers = o.headers || {};
                o.headers['x-telegram-init-data'] = initData;
                return fetch('/api' + p, o);
            };
            let currentReferenceText = null;
            let currentType = 'general';
            const openDB = () => new Promise((resolve, reject) => {
                const req = indexedDB.open('Index.db', 1);
                req.onupgradeneeded = () => {
                    const db = req.result;
                    if (!db.objectStoreNames.contains('assessments')) db.createObjectStore('assessments', { keyPath: 'id', autoIncrement: true });
                    if (!db.objectStoreNames.contains('files')) db.createObjectStore('files', { keyPath: 'id', autoIncrement: true });
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
            const saveAssessment = async (data) => {
                const db = await openDB();
                const tx = db.transaction('assessments', 'readwrite');
                tx.objectStore('assessments').add({ createdAt: Date.now(), data });
                tx.oncomplete = () => db.close();
            };
            const savePDFBlob = async (blob) => {
                const db = await openDB();
                const tx = db.transaction('files', 'readwrite');
                tx.objectStore('files').add({ createdAt: Date.now(), name: 'report_' + Date.now() + '.pdf', blob });
                tx.oncomplete = () => db.close();
            };
            const greet = (name) => {
                const el = document.querySelector('.greeting-text');
                if (el) el.innerHTML = 'Salom, ' + name + '! <small>yangi imkoniyatlar</small>';
            };
            apiFetch('/user-data').then(r => r.ok ? r.json() : null).then(d => {
                if (d && d.user && d.user.first_name) greet(d.user.first_name);
            }).catch(() => { });
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.addEventListener('mousemove', function (e) {
                    const rect = this.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    this.style.setProperty('--x', x + '%');
                    this.style.setProperty('--y', y + '%');
                });
                btn.addEventListener('mouseleave', function () {
                    this.style.setProperty('--x', '30%');
                    this.style.setProperty('--y', '30%');
                });
            });
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.addEventListener('touchstart', function () { this.style.transition = 'all 0.1s'; }, { passive: true });
                btn.addEventListener('touchend', function () { this.style.transition = ''; });
            });
            const q = (label) => document.querySelector('.menu-btn[aria-label="' + label + '"]');
            // index sahifada faqat salomlashuvni dinamik qiladi
        })();
    </script>
</body>
</html>
